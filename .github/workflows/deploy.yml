name: Deploy to WP Engine

on:
  push:
    branches: [main, staging]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        uses: wpengine/github-action-wpe-site-deploy@stable
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ vars.WPE_PROD_ENV }}
          SRC_PATH: "."
          REMOTE_PATH: "wp-content/themes/youbetcha-blocks-theme/"
          PHP_LINT: true
          CACHE_CLEAR: true

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/staging'
        uses: wpengine/github-action-wpe-site-deploy@stable
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ vars.WPE_STAGING_ENV }}
          SRC_PATH: "."
          REMOTE_PATH: "wp-content/themes/youbetcha-blocks-theme/"
          CACHE_CLEAR: true
